<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../chan.css">
    <script src="../scripts/js/site-settings.js"></script>
    <title>SKETCHES - YURI.NEET09</title>
</head>
<body onload="filterPosts()">
    <div class="boardlist">
        <span class="boardlist-dynamic"></span>
        <span class="boardlist-right">[<a href="#" data-open-settings data-i18n="settings">settings</a>]</span>
    </div>

    <div class="logo">
        <img class="board-emblem" src="https://i.pinimg.com/736x/a6/e0/00/a6e0006d7d0e465b11a328d4d841cbf5.jpg" alt="">
        <div class="subtitle">Art Archive</div>
        <hr class="hrThin">
    </div>

    <div class="blackcontainer">
        <div class="blog-toolbar">
            <span class="toolbar-group">
                <span class="toolbar-label" data-i18n="sort">sort</span>:
                <div id="sortContainer" style="display: inline-block;"></div>
            </span>
            <span class="toolbar-group" style="margin-left: 15px;">
                <span class="toolbar-label">badge</span>:
                <span id="badgeFilterContainer"></span>
            </span>
        </div>
<hr>
        <div id="adminContainer"></div>

        <div id="postsContainer">
            <div class="no-posts">no posts yet.</div>
        </div>
    </div>

    <div id="lb" onclick="lbClose()">
        <img id="lb-img" alt="">
    </div>

    <div class="footer">
        <div class="footer-boardlist"></div>
    </div>

    <script src="../scripts/js/sketch-data.js"></script>
    <script src="../scripts/js/script.js"></script>
    <script type="module" src="../scripts/js/firebase.js"></script>
</body>
</html>
